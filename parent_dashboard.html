<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍👧 家长看板 - 羽佳学习进度</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.7;
        }
        
        /* 孩子选择器 */
        .child-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .child-btn {
            padding: 12px 24px;
            border: 2px solid #3498db;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .child-btn.active {
            background: #3498db;
            color: white;
        }
        
        .child-btn:hover {
            transform: translateY(-2px);
        }
        
        /* 实时进度卡片 */
        .realtime-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-box.green {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #2c3e50;
        }
        
        .stat-box.orange {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #2c3e50;
        }
        
        .stat-box.blue {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.8;
        }
        
        /* 任务进度表 */
        .tasks-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .tasks-table th {
            background: #ecf0f1;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 2px solid #bdc3c7;
        }
        
        .tasks-table td {
            padding: 12px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .task-name {
            font-weight: 600;
            color: #2c3e50;
        }
        
        .task-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-pending {
            background: #ecf0f1;
            color: #7f8c8d;
        }
        
        .status-running {
            background: #f39c12;
            color: white;
            animation: pulse 1s infinite;
        }
        
        .status-completed {
            background: #27ae60;
            color: white;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .task-time {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        /* 日报卡片 */
        .daily-report {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .report-section {
            margin-bottom: 20px;
        }
        
        .report-section h3 {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .report-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #555;
        }
        
        .report-value {
            font-weight: bold;
            color: #2c3e50;
        }
        
        /* 通知设置 */
        .notification-settings {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .setting-item:last-child {
            border-bottom: none;
        }
        
        .toggle {
            width: 50px;
            height: 28px;
            background: #bdc3c7;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s ease;
        }
        
        .toggle.active {
            background: #27ae60;
        }
        
        .toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s ease;
        }
        
        .toggle.active::after {
            left: 24px;
        }
        
        /* 实时更新指示 */
        .live-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #27ae60;
            border-radius: 50%;
            animation: blink 1s infinite;
            margin-right: 5px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .last-update {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 10px;
        }

        .sync-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .sync-status {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        .sync-status.ok { background: #d4edda; color: #155724; }
        .sync-status.error { background: #f8d7da; color: #721c24; }
        .sync-status.loading { background: #fff3cd; color: #856404; }

        .refresh-btn {
            padding: 6px 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #2980b9; }
        .refresh-btn:active { transform: scale(0.96); }

        .points-badge {
            display: inline-block;
            background: linear-gradient(135deg, #fff3cd, #ffe69c);
            color: #856404;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-left: 10px;
        }
        .points-card {
            background: linear-gradient(135deg, #fff8e1 0%, #fff3e0 100%);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            border-left: 4px solid #FFA000;
        }
        .points-current {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .points-value {
            font-size: 24px;
            font-weight: 800;
            color: #FF6D00;
            margin-left: 8px;
        }
        .points-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .points-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .points-btn.plus { background: #4CAF50; color: white; }
        .points-btn.minus { background: #f44336; color: white; }
        .points-btn.detail { background: #2196F3; color: white; }
        .points-log-section {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #ddd;
        }
        .points-log-section h4 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #666;
        }
        .points-log-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 13px;
        }
        .points-log-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }
        .points-log-item .time { color: #888; font-size: 12px; }
        .points-log-item .plus { color: #4CAF50; }
        .points-log-item .minus { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍👧 家长看板 <span class="points-badge" id="pointsBadge" style="display:none"></span></h1>
            <p>实时查看孩子的学习进度</p>
        </div>

        <!-- 同步状态栏 -->
        <div class="sync-bar">
            <div class="sync-status loading" id="syncStatus">🔄 初始化中...</div>
            <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">🔄 手动刷新</button>
            <button class="refresh-btn" onclick="backupAllData(event)">💾 备份数据</button>
        </div>
        
        <!-- 孩子选择 -->
        <div class="child-selector">
            <button class="child-btn active" onclick="selectChild('yujia', event)">👧 羽佳</button>
            <button class="child-btn" onclick="selectChild('yuhan', event)">👧 羽菡</button>
        </div>

        <!-- 日期选择器 -->
        <div id="dateSelectorBar" style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.06);">
            <span style="font-size:13px;color:#888;white-space:nowrap;">📅 查看日期：</span>
            <input type="date" id="viewDate" style="flex:1;padding:7px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;color:#333;outline:none;" onchange="onDateChange()">
            <button onclick="setViewDate('today')" style="padding:7px 14px;background:#4CAF50;color:white;border:none;border-radius:10px;font-size:13px;cursor:pointer;white-space:nowrap;">今天</button>
            <button onclick="setViewDate('yesterday')" style="padding:7px 14px;background:#9e9e9e;color:white;border:none;border-radius:10px;font-size:13px;cursor:pointer;white-space:nowrap;">昨天</button>
        </div>
        
        <!-- 实时进度 -->
        <div class="realtime-card">
            <div class="card-title">
                <span class="live-indicator"></span>
                📊 <span id="dashboardDateLabel">今日</span>实时进度
            </div>
            
            <div class="progress-grid">
                <div class="stat-box green">
                    <div class="stat-value" id="completedCount">0</div>
                    <div class="stat-label">已完成作业</div>
                </div>
                <div class="stat-box orange">
                    <div class="stat-value" id="totalTime">0</div>
                    <div class="stat-label">学习时长（分钟）</div>
                </div>
                <div class="stat-box blue">
                    <div class="stat-value" id="efficiency">0%</div>
                    <div class="stat-label">学习效率</div>
                </div>
                <!-- 超时统计 -->
                <div class="stat-box red">
                    <div class="stat-value" id="overTime" style="color:#e64a19;">0</div>
                    <div class="stat-label">超时分钟</div>
                </div>
                <div class="stat-box purple">
                    <div class="stat-value" id="overCount">0</div>
                    <div class="stat-label">超时次数</div>
                </div>
            </div>
            
            <table class="tasks-table">
                <thead>
                    <tr>
                        <th>作业项目</th>
                        <th>状态</th>
                        <th>用时</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
            
            <div class="last-update">
                最后更新：<span id="lastUpdate">--</span>
            </div>
        </div>
        
        <!-- 每日报告 -->
        <div class="daily-report">
            <div class="card-title">📋 每日学习报告</div>
            
            <div class="report-section">
                <h3>📈 学习统计</h3>
                <div class="report-item">
                    <span>总学习时间</span>
                    <span class="report-value" id="reportTotalTime">0 分钟</span>
                </div>
                <div class="report-item">
                    <span>休息时间</span>
                    <span class="report-value" id="reportRestTime">0 分钟</span>
                </div>
                <div class="report-item">
                    <span>学习效率</span>
                    <span class="report-value" id="reportEfficiency">0%</span>
                </div>
            </div>
            
            <div class="report-section">
                <h3>⭐ 亮点</h3>
                <div id="reportHighlight">暂无数据</div>
            </div>
            
            <div class="report-section">
                <h3>⚠️ 需要关注</h3>
                <div id="reportConcern">暂无数据</div>
            </div>
        </div>
        
        <!-- 积分管理卡片 -->
        <div class="points-card">
            <div class="card-title">⭐ 积分管理</div>
            
            <div class="points-current">
                <span>当前积分：</span>
                <span class="points-value" id="currentPoints">0</span>
            </div>
            
            <div class="points-actions">
                <button class="points-btn plus" onclick="adjustPoints(1)">➕ 加分</button>
                <button class="points-btn minus" onclick="adjustPoints(-1)">➖ 减分</button>
                <button class="points-btn detail" onclick="showPointsLog()">📋 明细</button>
            </div>

            <!-- 积分历史查询 -->
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                    <span style="font-size:13px;color:#666;">📅 查看历史：</span>
                    <input type="date" id="pointsHistoryDate" style="padding:6px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
                    <button class="points-btn" style="background:#2196F3;color:white;padding:6px 12px;font-size:12px;" onclick="loadPointsHistory()">查询</button>
                </div>
            </div>

            <div class="points-export-section" style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                    <span style="font-size:13px;color:#666;">📅 导出范围：</span>
                    <input type="date" id="exportStartDate" style="padding:6px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
                    <span style="color:#999;">至</span>
                    <input type="date" id="exportEndDate" style="padding:6px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
                    <button class="points-btn" style="background:#9c27b0;color:white;padding:6px 12px;font-size:12px;" onclick="exportPointsLog()">📥 导出统计表</button>
                </div>
            </div>
            
            <div class="points-log-section" id="pointsLogSection" style="display:none;">
                <h4>积分明细</h4>
                <div class="points-log-list" id="pointsLogList"></div>
            </div>
        </div>
        
        <!-- 通知设置 -->
        <div class="notification-settings">
            <div class="card-title">🔔 通知设置</div>
            
            <div class="setting-item">
                <span>作业完成时提醒</span>
                <div class="toggle active" onclick="toggleNotification(this, 'taskComplete')"></div>
            </div>
            <div class="setting-item">
                <span>每日学习报告</span>
                <div class="toggle active" onclick="toggleNotification(this, 'dailyReport')"></div>
            </div>
            <div class="setting-item">
                <span>超时提醒</span>
                <div class="toggle active" onclick="toggleNotification(this, 'overtime')"></div>
            </div>
        </div>
    </div>
    
    <script>
        // GitHub 配置
        const _t = ['ghp_4trSqjSev', 'anCogqd3BDiF', 'mH6fWQcwt0sYUHM'];
        const GITHUB_TOKEN = _t.join('');
        const GITHUB_REPO = 'tangshaoxiong1978-ops/yujia-homework-cat';
        
        // Base64 解码兼容函数
        function base64Decode(str) {
            try { return decodeURIComponent(escape(atob(str))); } catch(e) { return null; }
        }
        
        // 归档今日数据到历史文件（带重试）
        async function archiveTodayData(data, child, dateStr) {
            const maxRetries = 3;
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    const historyFile = `data/${child}_history_${dateStr}.json`;
                    const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/${historyFile}`;
                    const getResp = await fetch(apiUrl, {
                        headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    let sha = null;
                    if (getResp.ok) {
                        const info = await getResp.json();
                        sha = info.sha;
                    }
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
                    const body = { message: `archive: ${child} ${dateStr} 历史数据`, content };
                    if (sha) body.sha = sha;
                    const putResp = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });
                    if (putResp.ok) {
                        console.log(`📦 历史数据已归档：${historyFile}`);
                        return true;
                    }
                } catch (e) {
                    console.warn(`归档尝试${attempt}异常:`, e.message);
                }
                if (attempt < maxRetries) await new Promise(r => setTimeout(r, 1000));
            }
            return false;
        }
        
        // 同步状态显示
        let syncStatus = { yujia: false, yuhan: false };
        
        let currentChild = 'yujia';
        let notificationSettings = {
            taskComplete: true,
            dailyReport: true,
            overtime: true
        };

        // 当前查看日期（默认今天）
        let viewDateStr = new Date().toISOString().split('T')[0];
        // 历史数据缓存 { 'yujia_2026-04-04': data, ... }
        let historyCache = {};
        
        // 初始化日期选择器
        function initDatePicker() {
            const input = document.getElementById('viewDate');
            if (input) input.value = viewDateStr;
        }

        function setViewDate(preset) {
            const d = new Date();
            if (preset === 'yesterday') d.setDate(d.getDate() - 1);
            viewDateStr = d.toISOString().split('T')[0];
            const input = document.getElementById('viewDate');
            if (input) input.value = viewDateStr;
            onDateChange();
        }

        function onDateChange() {
            const input = document.getElementById('viewDate');
            viewDateStr = input ? input.value : new Date().toISOString().split('T')[0];
            updateDateLabel();
            updateDashboard();
            // 如果选的是历史日期，尝试从GitHub拉取历史数据
            const today = new Date().toISOString().split('T')[0];
            if (viewDateStr !== today) loadHistoryData(viewDateStr);
        }

        function updateDateLabel() {
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            const el = document.getElementById('dashboardDateLabel');
            if (!el) return;
            if (viewDateStr === today) el.textContent = '今日';
            else if (viewDateStr === yesterday) el.textContent = '昨日';
            else el.textContent = viewDateStr;
        }

        async function loadHistoryData(dateStr) {
            // 尝试从GitHub拉取历史归档数据
            for (const child of ['yujia', 'yuhan']) {
                const cacheKey = `${child}_${dateStr}`;
                if (historyCache[cacheKey]) continue; // 已缓存
                try {
                    const url = `https://tangshaoxiong1978-ops.github.io/yujia-homework-cat/data/${child}_history_${dateStr}.json`;
                    const controller = new AbortController();
                    setTimeout(() => controller.abort(), 4000);
                    const resp = await fetch(url, { signal: controller.signal });
                    if (resp.ok) {
                        const data = await resp.json();
                        historyCache[cacheKey] = data;
                        console.log(`[历史] ${child} ${dateStr} 加载成功`);
                        updateDashboard();
                    }
                } catch(e) { /* 无历史归档，正常 */ }
            }
        }
        
        // 真实数据存储
        let realData = {
            yujia: null,
            yuhan: null
        };
        
        // localStorage 缓存键名
        const CACHE_KEYS = {
            yujia: 'homework_yujia_cache',
            yuhan: 'homework_yuhan_cache'
        };
        
        // 从 localStorage 加载缓存
        function loadFromCache(child) {
            try {
                const cached = localStorage.getItem(CACHE_KEYS[child]);
                if (cached) {
                    const data = JSON.parse(cached);
                    console.log(`[${child}] 从缓存加载成功`);
                    return data;
                }
            } catch(e) {
                console.warn(`[${child}] 缓存读取失败:`, e.message);
            }
            return null;
        }
        
        // 保存到 localStorage 缓存
        function saveToCache(child, data) {
            try {
                localStorage.setItem(CACHE_KEYS[child], JSON.stringify(data));
                console.log(`[${child}] 缓存已保存`);
            } catch(e) {
                console.warn(`[${child}] 缓存保存失败:`, e.message);
            }
        }
        
        // 模拟数据（当无法获取真实数据时的fallback）
        const mockData = {
            yujia: {
                child: 'yujia',
                childName: '羽佳',
                points: 0,
                pointsLog: [],
                tasks: [
                    { name: '橙果APP打卡', status: 'pending', time: '--' },

        // 从GitHub仓库读取JSON数据
        // 使用 GitHub Pages 获取数据（最简单可靠）
        async function fetchFromGitHub(child) {
            console.log(`[${child}] 开始获取数据...`);
            try {
                // 直接用 GitHub Pages URL，浏览器原生支持
                const url = `https://tangshaoxiong1978-ops.github.io/yujia-homework-cat/data/${child}_data.json`;
                console.log(`[${child}] URL:`, url);
                
                // 使用 AbortController 添加5秒超时
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                    console.log(`[${child}] 请求超时`);
                }, 5000);
                
                const resp = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (resp.ok) {
                    const data = await resp.json();
                    console.log(`[${child}] ✅ 成功! points:`, data.points);
                    return data;
                }
                console.log(`[${child}] 响应失败:`, resp.status, resp.statusText);
                // 显示错误详情
                const statusEl = document.getElementById('syncStatus');
                if (statusEl) statusEl.textContent = `⚠️ 数据获取失败: HTTP ${resp.status}`;
            } catch(e) {
                console.error(`[${child}] 异常:`, e.message, e.name);
                // 显示具体错误
                const statusEl = document.getElementById('syncStatus');
                if (statusEl) {
                    if (e.name === 'AbortError') {
                        statusEl.textContent = '⏱️ 请求超时，请检查网络';
                    } else if (e.message.includes('Failed to fetch') || e.message.includes('network')) {
                        statusEl.textContent = '🌐 网络错误，请检查网络连接';
                    } else {
                        statusEl.textContent = `⚠️ 错误: ${e.message}`;
                    }
                }
            }
            return null;
        }

        // 备份所有数据到本地文件
        async function backupAllData() {
            const btn = event.target;
            btn.textContent = '⏳ 备份中...';
            btn.disabled = true;
            
            try {
                // 获取所有数据
                const [yujiaData, yuhanData] = await Promise.all([
                    fetchFromGitHub('yujia'),
                    fetchFromGitHub('yuhan')
                ]);
                
                // 构建备份数据
                const backup = {
                    backupTime: new Date().toISOString(),
                    children: {
                        yujia: yujiaData,
                        yuhan: yuhanData
                    }
                };
                
                // 生成文件名：backup_YYYY-MM-DD_HH-mm-ss.json
                const now = new Date();
                const timestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;
                const filename = `homework_backup_${timestamp}.json`;
                
                // 创建并下载文件
                const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                btn.textContent = '✅ 已备份';
                setTimeout(() => {
                    btn.textContent = '💾 备份数据';
                    btn.disabled = false;
                }, 2000);
            } catch (e) {
                alert('备份失败: ' + e.message);
                btn.textContent = '💾 备份数据';
                btn.disabled = false;
            }
        }

        // 积分调整（家长手动加减分）
        async function adjustPoints(direction) {
            const reason = direction > 0 ? prompt('加分原因（可选）') : prompt('减分原因（可选）');
            if (reason === null) return; // 取消
            
            const change = direction > 0 ? parseInt(prompt('加分/减分分值（正数）：', '1') || '1') : -parseInt(prompt('减分分值（正数）：', '1') || '1');
            if (isNaN(change) || change === 0) { alert('请输入有效分值'); return; }
            
            const child = currentChild;
            const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/data/${child}_data.json`;
            
            // 先获取当前数据
            try {
                const getResp = await fetch(apiUrl, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (!getResp.ok) { alert('获取数据失败'); return; }
                
                const fileInfo = await getResp.json();
                const decoded = base64Decode(fileInfo.content);
                if (!decoded) { alert('解码失败'); return; }
                let data = JSON.parse(decoded);
                
                // 更新积分
                data.points = (data.points || 0) + change;
                data.lastUpdated = new Date().toISOString();
                
                // 添加积分记录（格式兼容孩子页面：amount+reason+time+total）
                if (!data.pointsLog) data.pointsLog = [];
                data.pointsLog.push({
                    amount: change,  // 积分变动（正数加分，负数减分）
                    reason: reason || (change > 0 ? '家长加分' : '家长减分'),
                    time: new Date().toISOString(),
                    total: data.points // 变动后的累计积分
                });
                data.pointsLog = data.pointsLog.slice(-20); // 保留最近20条
                
                // 【新增】同时归档今日历史快照（供历史查询）
                const todayStr = new Date().toISOString().split('T')[0];
                await archiveTodayData(data, currentChild, todayStr);
                
                // 推送到GitHub
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
                const body = {
                    message: `家长手动调整积分：${change > 0 ? '+' : ''}${change}`,
                    content: content,
                    sha: fileInfo.sha
                };
                const putResp = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                
                if (putResp.ok) {
                    alert(`✅ ${change > 0 ? '加分' : '减分'}成功！当前积分：${data.points}`);
                    // 【关键修复】立即更新本地缓存并刷新显示
                    realData[currentChild] = data;
                    saveToCache(currentChild, data);
                    updateSyncStatus();
                    updateDashboard();
                } else {
                    alert('❌ 同步失败，请重试');
                }
            } catch (e) {
                alert('❌ 操作失败：' + e.message);
            }
        }

                if (data.pointsLog && data.pointsLog.length > 0) {
                    logList.innerHTML = data.pointsLog.map(log => {
                        const d = new Date(log.time);
                        const timeStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
                        return `<div class="points-log-item">
                            <div>
                                <div class="points-log-desc">${log.reason || '积分变动'}</div>
                                <div class="points-log-date">${timeStr} · 累计 ${log.total} 分</div>
                            </div>
                            <div class="points-log-amount" style="color:#4CAF50;">+${log.amount}</div>
                        </div>`;
                    }).join('');
                } else {
                    logList.innerHTML = '<div style="text-align:center;color:#aaa;padding:20px 0">该日期暂无积分记录</div>';
                }
            } catch(e) {
                document.getElementById('currentPoints').textContent = '0';
                document.getElementById('pointsLogList').innerHTML = `<div style="text-align:center;color:#f66;padding:20px 0">❌ ${selectedDate} 无历史积分数据</div>`;
                document.getElementById('pointsLogSection').style.display = 'block';
            }
        }
        
        // 导出积分明细统计表（Excel格式）
        function exportPointsLog() {
            const rawData = realData[currentChild];
            const pointsLog = rawData && rawData.pointsLog ? rawData.pointsLog : [];
            
            if (pointsLog.length === 0) {
                alert('暂无积分明细可导出');
                return;
            }
            
            const startDateInput = document.getElementById('exportStartDate').value;
            const endDateInput = document.getElementById('exportEndDate').value;
            
            // 过滤日期范围
            let filteredLog = pointsLog;
            if (startDateInput || endDateInput) {
                filteredLog = pointsLog.filter(log => {
                    if (!log.time) return false;
                    const logDate = new Date(log.time).toISOString().split('T')[0];
                    if (startDateInput && logDate < startDateInput) return false;
                    if (endDateInput && logDate > endDateInput) return false;
                    return true;
                });
            }
            
            if (filteredLog.length === 0) {
                alert('指定日期范围内无积分记录');
                return;
            }
            
            // 统计
            const stats = {
                totalEarned: 0,
                totalSpent: 0,
                items: filteredLog.length,
                byReason: {}
            };
            
            filteredLog.forEach(log => {
                const amount = (log.amount !== undefined) ? log.amount : (log.change || 0);
                if (amount > 0) stats.totalEarned += amount;
                else stats.totalSpent += Math.abs(amount);
                
                const reason = (log.reason !== undefined) ? log.reason : (log.desc || '其他');
                if (!stats.byReason[reason]) stats.byReason[reason] = { count: 0, amount: 0 };
                stats.byReason[reason].count++;
                stats.byReason[reason].amount += amount;
            });
            
            // 生成CSV内容
            const childName = currentChild === 'yujia' ? '羽佳' : '羽菡';
            const today = new Date().toLocaleString('zh-CN');
            let csv = `积分明细统计表（${childName}）\n`;
            csv += `导出时间：${today}\n`;
            if (startDateInput || endDateInput) {
                csv += `日期范围：${startDateInput || '开始'} 至 ${endDateInput || '今天'}\n`;
            }
            csv += `\n`;
            csv += `=== 汇总统计 ===\n`;
            csv += `总记录条数,${stats.items}\n`;
            csv += `总获得积分,${stats.totalEarned}\n`;
            csv += `总扣除积分,${Math.abs(stats.totalSpent)}\n`;
            csv += `净收益,${stats.totalEarned + stats.totalSpent}\n`;
            csv += `\n`;
            csv += `=== 明细记录 ===\n`;
            csv += `日期,时间,积分变动,变动原因,累计积分\n`;
            
            let runningTotal = 0;
            filteredLog.forEach(log => {
                const amount = (log.amount !== undefined) ? log.amount : (log.change || 0);
                runningTotal += amount;
                const dt = log.time ? new Date(log.time) : new Date();
                const date = dt.toLocaleDateString('zh-CN');
                const time = dt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                const reason = (log.reason !== undefined) ? log.reason.replace(/,/g, '，') : (log.desc || '其他');
                csv += `${date},${time},${amount},${reason},${runningTotal}\n`;
            });
            
            // 下载文件
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const filename = `积分明细_${childName}_${new Date().toISOString().split('T')[0]}.csv`;
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert(`✅ 已导出 ${stats.items} 条记录到文件`);
        }
        
        // 初始化日期输入框为当月范围
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
        document.getElementById('exportStartDate').value = firstDay;
        document.getElementById('exportEndDate').value = now.toISOString().split('T')[0];
        
        // 初始化日期选择器
        initDatePicker();
        updateDateLabel();
        
        // 实时更新（每30秒重新加载数据；只在查看今天时自动刷新）
        setInterval(() => {
            const today = new Date().toISOString().split('T')[0];
            if (viewDateStr === today) loadAllData();
        }, 30000);
        
        // 初始化 - 根据查看的日期决定加载实时数据还是历史数据
        console.log('[初始化] 开始执行...');
        (async () => {
            try {
                const today = new Date().toISOString().split('T')[0];
                console.log('[初始化] today=', today, 'viewDateStr=', viewDateStr);
                if (viewDateStr === today) {
                    // 查看今天 → 加载实时数据
                    console.log('[初始化] 调用 loadAllData()');
                    await loadAllData();
                } else {
                    // 查看历史日期 → 加载历史归档数据
                    updateDateLabel();
                    await loadHistoryData(viewDateStr);
                    updateDashboard();
                }
                console.log('[初始化] 完成');
            } catch (e) {
                console.error('[初始化] 异常:', e);
                const statusEl = document.getElementById('syncStatus');
                if (statusEl) {
                    statusEl.textContent = '❌ 初始化异常: ' + e.message;
                    statusEl.className = 'sync-status error';
                }
                // 即使异常也尝试渲染
                realData.yujia = loadFromCache('yujia') || mockData.yujia;
                realData.yuhan = loadFromCache('yuhan') || mockData.yuhan;
                updateSyncStatus();
                updateDashboard();
            }
        })();
    </script>
</body>
</html>
