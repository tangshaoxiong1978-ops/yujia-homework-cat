<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羽佳猫咪计时器 🐱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff0f3 0%, #ffe4ec 50%, #fff5f7 100%);
            min-height: 100vh;
            padding-bottom: 40px;
            position: relative;
            overflow-x: hidden;
        }

        /* 浮动装饰 */
        body::before {
            content: '✨';
            position: fixed;
            top: 60px;
            right: 20px;
            font-size: 32px;
            opacity: 0.3;
            animation: float 3s ease-in-out infinite;
        }
        body::after {
            content: '🐾';
            position: fixed;
            top: 120px;
            left: 15px;
            font-size: 24px;
            opacity: 0.25;
            animation: float 4s ease-in-out infinite 1s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 顶部 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 16px rgba(255,107,157,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF8FB3 0%, #FF6B9D 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(255,107,157,0.3);
        }

        .header-name {
            font-size: 18px;
            font-weight: 700;
            color: #E91E63;
        }

        /* 截止时间醒目倒计时 */
        .header-deadline {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(255,107,157,0.1);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #FF6B9D;
            transition: all 0.3s;
        }
        .header-deadline.warning {
            background: rgba(255,193,7,0.15);
            color: #e67e22;
            animation: blink-warn 1s ease-in-out infinite;
        }
        .header-deadline.danger {
            background: rgba(231,76,60,0.15);
            color: #e74c3c;
            animation: blink-danger 0.6s ease-in-out infinite;
        }
        @keyframes blink-warn { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes blink-danger { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .header-deadline-icon { font-size: 14px; }
        .header-deadline-time { font-variant-numeric: tabular-nums; }

        .header-switch {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: linear-gradient(135deg, #C8E6C9 0%, #81C784 100%);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #2E7D32;
            text-decoration: none;
        }

        /* 主内容 */
        .main { padding: 0 16px; }

        /* 头像区 */
        .avatar-section {
            text-align: center;
            padding: 24px 0 16px;
        }

        .main-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF8FB3 0%, #FF6B9D 100%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            box-shadow: 0 8px 24px rgba(255,107,157,0.35);
            margin-bottom: 10px;
            animation: pulse-soft 3s ease-in-out infinite;
        }

        @keyframes pulse-soft {
            0%, 100% { box-shadow: 0 8px 24px rgba(255,107,157,0.35); }
            50% { box-shadow: 0 8px 32px rgba(255,107,157,0.5); }
        }

        .greeting {
            font-size: 20px;
            font-weight: 700;
            color: #E91E63;
            margin-bottom: 4px;
        }

        .date-display {
            font-size: 14px;
            color: #999;
        }

        /* 进度卡 */
        .card {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(255,107,157,0.1);
        }

        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .progress-title {
            font-size: 15px;
            font-weight: 600;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-count {
            font-size: 18px;
            font-weight: 800;
            color: #FF6B9D;
        }

        .progress-bar {
            height: 10px;
            background: #fce4ec;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF8FB3, #FF6B9D);
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
        }

        .stat-item { text-align: center; }

        .stat-value {
            font-size: 26px;
            font-weight: 800;
            color: #FF6B9D;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }

        /* 截止时间 */
        .deadline-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #888;
        }

        .deadline-time {
            font-size: 24px;
            font-weight: 800;
            color: #FF6B9D;
        }

        .deadline-time.overdue { color: #e74c3c; }

        /* 预作业提示（来自家长布置） */
        .assigned-alert {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 14px;
            border-left: 4px solid #FF9800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .assigned-alert-icon { font-size: 24px; }

        .assigned-alert-text {
            flex: 1;
        }

        .assigned-alert-title {
            font-size: 14px;
            font-weight: 700;
            color: #E65100;
            margin-bottom: 2px;
        }

        .assigned-alert-desc {
            font-size: 13px;
            color: #777;
        }

        .assigned-alert-action {
            padding: 8px 16px;
            background: linear-gradient(135deg, #FFB74D 0%, #FF9800 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* 作业列表 */
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 700;
            color: #555;
            margin-bottom: 12px;
        }

        .homework-item {
            background: rgba(255,255,255,0.92);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            box-shadow: 0 3px 14px rgba(255,107,157,0.08);
            transition: transform 0.2s;
        }

        .homework-item:hover { transform: translateY(-1px); }

        .homework-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .homework-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .homework-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #FF8FB3 0%, #FF6B9D 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .homework-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .homework-time {
            font-size: 13px;
            color: #aaa;
        }

        .homework-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-waiting { background: #fce4ec; color: #e91e63; }
        .status-doing { background: #e3f2fd; color: #1976d2; }
        .status-done { background: #e8f5e9; color: #4caf50; }

        .start-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #FF8FB3 0%, #FF6B9D 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .start-btn:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(255,107,157,0.4); }
        .start-btn:disabled { background: #ddd; cursor: not-allowed; transform: none; box-shadow: none; }

        /* 添加作业 */
        .add-form {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .add-input {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid #fce4ec;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .add-input:focus { border-color: #FF6B9D; }

        .time-input {
            width: 72px;
            padding: 12px;
            border: 2px solid #fce4ec;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            outline: none;
        }

        .time-input:focus { border-color: #FF6B9D; }

        .add-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #FF8FB3 0%, #FF6B9D 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        /* 底部报告按钮 */
        .report-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFB74D 0%, #FF9800 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(255,152,0,0.3);
            margin-top: 8px;
        }

        /* 计时弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            width: 90%;
            max-width: 340px;
            text-align: center;
        }

        .modal-cat {
            font-size: 64px;
            margin-bottom: 8px;
        }

        .modal-task {
            font-size: 17px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .modal-sub {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .timer-display {
            font-size: 52px;
            font-weight: 800;
            color: #FF6B9D;
            font-variant-numeric: tabular-nums;
            margin-bottom: 6px;
        }

        .timer-display.overtime { color: #e74c3c; }

        .timer-compare {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        .timer-compare.early { color: #27ae60; }
        .timer-compare.late { color: #e74c3c; }

        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .timer-btn {
            padding: 12px 28px;
            border-radius: 30px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary { background: linear-gradient(135deg, #FF8FB3, #FF6B9D); color: white; }
        .btn-secondary { background: #f5f5f5; color: #555; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #27ae60; color: white; }

        /* 完成弹窗 */
        .complete-emoji { font-size: 72px; margin-bottom: 8px; }
        .complete-title { font-size: 22px; font-weight: 800; color: #333; margin-bottom: 16px; }
        .complete-stats {
            background: #fff5f7;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .stat-row:last-child { margin-bottom: 0; }
        .stat-row-label { color: #888; }
        .stat-row-value { font-weight: 700; color: #333; }
        .complete-feedback { font-size: 15px; color: #FF6B9D; font-weight: 700; margin-bottom: 16px; }

        /* 数据管理 */
        .data-actions { display: flex; gap: 8px; margin-bottom: 12px; }
        .data-btn {
            flex: 1;
            padding: 12px 8px;
            border-radius: 12px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .data-btn.export { background: #e3f2fd; color: #1565c0; }
        .data-btn.import { background: #e8f5e9; color: #2e7d32; }
        .data-btn.reset { background: #fce4ec; color: #c62828; }
        .data-btn-icon { font-size: 20px; }

        #fileInput { display: none; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Tab 导航 */
        .tab-nav {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.6);
            color: #999;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #FF8FB3 0%, #FF6B9D 100%);
            color: white;
            box-shadow: 0 3px 10px rgba(255,107,157,0.3);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 统计卡片 */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .stat-card {
            background: rgba(255,255,255,0.7);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        .stat-card-icon { font-size: 24px; margin-bottom: 4px; }
        .stat-card-value { font-size: 22px; font-weight: 800; color: #FF6B9D; }
        .stat-card-label { font-size: 12px; color: #aaa; margin-top: 2px; }
        .week-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 80px;
            gap: 6px;
            padding: 10px 0;
        }
        .week-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .week-bar {
            width: 100%;
            background: linear-gradient(to top, #FF8FB3, #FF6B9D);
            border-radius: 6px 6px 0 0;
            min-height: 4px;
            transition: height 0.3s;
        }
        .week-bar-label { font-size: 11px; color: #aaa; }
        .week-bar-value { font-size: 10px; color: #999; }
    </style>
</head>
<body>
    <!-- 顶部 -->
    <div class="header">
        <div class="header-title">
            <div class="header-icon">🐱</div>
            <div class="header-name">羽佳猫咪计时器</div>
        </div>
        <!-- 截止时间倒计时 -->
        <div class="header-deadline" id="headerDeadline">
            <span class="header-deadline-icon">⏰</span>
            <span class="header-deadline-time" id="headerDeadlineTime">--:--</span>
        </div>
        <a href="yuhan.html" class="header-switch">🌿 切换羽菡</a>
    </div>

    <!-- 主内容 -->
    <div class="main">
        <!-- 头像 -->
        <div class="avatar-section">
            <div class="main-avatar">🐱</div>
            <div class="greeting">🐱 羽佳加油！今天也很棒！🐱</div>
            <div class="date-display" id="dateDisplay"></div>
        </div>

        <!-- 截止时间 -->
        <div class="card">
            <div class="deadline-row">
                <span>⏰</span>
                <span>今日截止</span>
                <span class="deadline-time" id="deadlineTime">22:30</span>
            </div>
            <div class="deadline-row" style="margin-bottom:0">
                <span id="deadlineRemaining" style="color:#FF6B9D;font-weight:700;font-size:15px;"></span>
            </div>
        </div>

        <!-- 进度 -->
        <div class="card">
            <div class="progress-header">
                <div class="progress-title">📚 今日进度</div>
                <div class="progress-count" id="progressCount">0/5</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <!-- Tab 统计 -->
        <div class="card">
            <div class="tab-nav">
                <button class="tab-btn active" id="tabToday" onclick="switchTab('today')">📅 今日</button>
                <button class="tab-btn" id="tabWeek" onclick="switchTab('week')">📆 本周</button>
                <button class="tab-btn" id="tabMonth" onclick="switchTab('month')">📊 本月</button>
            </div>
            <!-- 今日 -->
            <div class="tab-content active" id="contentToday">
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value" id="studyMinutes">0</div>
                        <div class="stat-label">学习分钟</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="restMinutes">0</div>
                        <div class="stat-label">休息分钟</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="efficiency">0%</div>
                        <div class="stat-label">学习效率</div>
                    </div>
                </div>
            </div>
            <!-- 本周 -->
            <div class="tab-content" id="contentWeek">
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-card-icon">📚</div><div class="stat-card-value" id="weekTotalMin">0</div><div class="stat-card-label">总学习分钟</div></div>
                    <div class="stat-card"><div class="stat-card-icon">⭐</div><div class="stat-card-value" id="weekAvgEff">0%</div><div class="stat-card-label">平均效率</div></div>
                    <div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-value" id="weekTasks">0</div><div class="stat-card-label">完成作业数</div></div>
                    <div class="stat-card"><div class="stat-card-icon">🏆</div><div class="stat-card-value" id="weekDays">0</div><div class="stat-card-label">学习天数</div></div>
                </div>
                <div class="week-chart" id="weekChart"></div>
            </div>
            <!-- 本月 -->
            <div class="tab-content" id="contentMonth">
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-card-icon">📚</div><div class="stat-card-value" id="monthTotalMin">0</div><div class="stat-card-label">总学习分钟</div></div>
                    <div class="stat-card"><div class="stat-card-icon">⭐</div><div class="stat-card-value" id="monthAvgEff">0%</div><div class="stat-card-label">平均效率</div></div>
                    <div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-value" id="monthTasks">0</div><div class="stat-card-label">完成作业数</div></div>
                    <div class="stat-card"><div class="stat-card-icon">🎯</div><div class="stat-card-value" id="monthBest">--</div><div class="stat-card-label">最高效率日</div></div>
                </div>
            </div>
        </div>

        <!-- 预布置作业提示 -->
        <div class="card" id="assignedAlert" style="display:none;">
            <div class="assigned-alert">
                <div class="assigned-alert-icon">📋</div>
                <div class="assigned-alert-text">
                    <div class="assigned-alert-title" id="assignedTitle">家长布置了新作业</div>
                    <div class="assigned-alert-desc" id="assignedDesc"></div>
                </div>
                <button class="assigned-alert-action" id="assignedStartBtn" onclick="startAssigned()">开始 ⏱</button>
            </div>
        </div>

        <!-- 作业列表 -->
        <div class="section-title">📝 今日作业</div>
        <div id="homeworkList"></div>

        <!-- 添加作业 -->
        <div class="card">
            <div class="section-title" style="margin-bottom:12px">✨ 添加额外作业</div>
            <div class="add-form">
                <input type="text" class="add-input" id="newName" placeholder="作业名称，如：练字一页">
                <input type="number" class="time-input" id="newTime" placeholder="分钟" min="1">
                <button class="add-btn" onclick="addHomework()">+</button>
            </div>
        </div>

        <!-- 数据管理 -->
        <div class="card">
            <div class="section-title" style="margin-bottom:12px">💾 数据管理</div>
            <div class="data-actions">
                <button class="data-btn export" onclick="exportData()">
                    <span class="data-btn-icon">📤</span>导出
                </button>
                <button class="data-btn import" onclick="document.getElementById('fileInput').click()">
                    <span class="data-btn-icon">📥</span>导入
                </button>
                <button class="data-btn reset" onclick="resetData()">
                    <span class="data-btn-icon">🔄</span>重置
                </button>
            </div>
            <button class="report-btn" onclick="sendReport()">
                📊 发送今日报告给爸爸妈妈
            </button>
        </div>
        <br><br>
    </div>

    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">

    <!-- 计时弹窗 -->
    <div class="modal-overlay" id="timerModal">
        <div class="modal">
            <div class="modal-cat">🐱</div>
            <div class="modal-task" id="modalTaskName">语文阅读</div>
            <div class="modal-sub" id="modalSub">专注中...</div>
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="timer-compare" id="timerCompare">预计 20 分钟</div>
            <div class="timer-controls">
                <button class="timer-btn btn-secondary" id="pauseBtn" onclick="pauseTimer()">⏸ 暂停</button>
                <button class="timer-btn btn-success" onclick="finishTask()">✅ 完成</button>
            </div>
        </div>
    </div>

    <!-- 完成弹窗 -->
    <div class="modal-overlay" id="completeModal">
        <div class="modal">
            <div class="complete-emoji" id="completeEmoji">🎉</div>
            <div class="complete-title" id="completeTitle">太棒了！</div>
            <div class="complete-stats">
                <div class="stat-row"><span class="stat-row-label">总用时</span><span class="stat-row-value" id="completeTotal">25分钟</span></div>
                <div class="stat-row"><span class="stat-row-label">预计时间</span><span class="stat-row-value" id="completeExpected">20分钟</span></div>
                <div class="stat-row"><span class="stat-row-label">实际学习</span><span class="stat-row-value" id="completeStudy">23分钟</span></div>
                <div class="stat-row"><span class="stat-row-label">休息时间</span><span class="stat-row-value" id="completeRest">2分钟</span></div>
                <div class="stat-row"><span class="stat-row-label">学习效率</span><span class="stat-row-value" id="completeEfficiency">92%</span></div>
            </div>
            <div class="complete-feedback" id="completeFeedback">提前完成！效率超高！✨</div>
            <button class="timer-btn btn-primary" style="width:100%" onclick="closeComplete()">继续加油 💪</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    const CHILD = 'yujia';
    const DEADLINE = '22:30';
    const ICON = '🐱';
    const CHILD_NAME = '羽佳';
    const CHILD_OPEN_ID = 'ou_3a8e6123c7769ffc8ba603fdd74c8b1a';  // 羽佳飞书 open_id
    const PARENT_OPEN_ID = 'ou_04d8a814e9b4ce5640739ee9c2221df5'; // 爸爸
    const FEISHU_WEBHOOK = 'https://open.feishu.cn/open-apis/bot/v2/hook/eff6ff06-c0cb-4c63-b032-a2b8776085d2';

    // Web Audio API 声音
    let audioCtx = null;
    function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
    function playBeep(freq=880, dur=0.3, vol=0.4) {
        try {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq; gain.gain.value = vol;
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
            osc.stop(ctx.currentTime + dur);
        } catch(e) {}
    }
    function playWarningSound() { playBeep(660, 0.15); setTimeout(() => playBeep(880, 0.15), 200); }
    function playDangerSound() { playBeep(440, 0.3, 0.6); setTimeout(() => playBeep(440, 0.3, 0.6), 400); setTimeout(() => playBeep(660, 0.3, 0.6), 800); }

    // Tab 切换
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        document.getElementById('content' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        if (tab === 'week') renderWeekStats();
        if (tab === 'month') renderMonthStats();
    }

    // 本周统计
    function renderWeekStats() {
        const days = ['日','一','二','三','四','五','六'];
        const now = new Date(), today = now.getDay();
        const weekData = [];
        let totalMin = 0, totalEff = 0, effCount = 0, taskCount = 0, studyDays = 0;
        let maxMin = 0;
        for (let i = 0; i < 7; i++) {
            const d = new Date(now);
            d.setDate(d.getDate() - today + i);
            const key = `timer_${CHILD}_${d.toISOString().split('T')[0]}`;
            const data = JSON.parse(localStorage.getItem(key) || '{}');
            const mins = data.studyMinutes || 0;
            weekData.push({ label: days[i], mins, isToday: i === today });
            totalMin += mins; if (mins > 0) studyDays++;
            if (data.efficiency) { totalEff += data.efficiency; effCount++; }
            taskCount += (data.tasks || []).length;
            if (mins > maxMin) maxMin = mins;
        }
        document.getElementById('weekTotalMin').textContent = totalMin;
        document.getElementById('weekAvgEff').textContent = effCount > 0 ? Math.round(totalEff / effCount) + '%' : '0%';
        document.getElementById('weekTasks').textContent = taskCount;
        document.getElementById('weekDays').textContent = studyDays;
        const chart = document.getElementById('weekChart');
        chart.innerHTML = weekData.map(d => {
            const h = maxMin > 0 ? Math.max(4, Math.round(d.mins / maxMin * 70)) : 4;
            return `<div class="week-bar-wrap">
                <div class="week-bar${d.isToday ? '' : ''}" style="height:${h}px;opacity:${d.isToday ? 1 : 0.5}"></div>
                <div class="week-bar-label">${d.label}</div>
                <div class="week-bar-value">${d.mins}m</div>
            </div>`;
        }).join('');
    }

    // 本月统计
    function renderMonthStats() {
        const now = new Date();
        let totalMin = 0, totalEff = 0, effCount = 0, taskCount = 0;
        let bestDay = '--', bestEff = 0;
        for (let d = 1; d <= 31; d++) {
            const dt = new Date(now.getFullYear(), now.getMonth(), d);
            if (dt > now) break;
            const key = `timer_${CHILD}_${dt.toISOString().split('T')[0]}`;
            const data = JSON.parse(localStorage.getItem(key) || '{}');
            totalMin += data.studyMinutes || 0;
            taskCount += (data.tasks || []).length;
            if (data.efficiency && data.efficiency > bestEff) { bestEff = data.efficiency; bestDay = `${now.getMonth()+1}/${d}`; }
            if (data.efficiency) { totalEff += data.efficiency; effCount++; }
        }
        document.getElementById('monthTotalMin').textContent = totalMin;
        document.getElementById('monthAvgEff').textContent = effCount > 0 ? Math.round(totalEff / effCount) + '%' : '0%';
        document.getElementById('monthTasks').textContent = taskCount;
        document.getElementById('monthBest').textContent = bestDay;
    }

    // 截止时间更新（含警告状态 + 声音）
    let lastWarningLevel = 0; // 0=normal, 1=warning, 2=danger
    function updateDeadlineWithWarning() {
        const now = new Date(), [h,m] = DEADLINE.split(':').map(Number);
        const deadline = new Date(now.setHours(h, m, 0));
        const diff = deadline - now;
        const el = document.getElementById('deadlineTime'), rem = document.getElementById('deadlineRemaining');
        const hdr = document.getElementById('headerDeadline');
        const hdrTime = document.getElementById('headerDeadlineTime');

        const rh = Math.floor(diff/3600000), rm = Math.floor((diff%3600000)/60000);

        if (diff < 0) {
            el.textContent = '已超时'; el.classList.add('overdue'); rem.textContent = '已过截止时间';
            hdrTime.textContent = '超时!'; hdr.className = 'header-deadline danger'; rem.style.color = '#e74c3c';
        } else if (diff < 30 * 60000) {
            const text = `还有 ${rh > 0 ? rh + '小时' : '' }${rm}分钟`;
            el.textContent = DEADLINE; el.classList.remove('overdue'); rem.textContent = text; rem.style.color = '#e74c3c';
            hdrTime.textContent = DEADLINE; hdr.className = 'header-deadline danger';
            if (lastWarningLevel < 2) { playDangerSound(); }
        } else if (diff < 60 * 60000) {
            const text = `还有 ${rh > 0 ? rh + '小时' : '' }${rm}分钟`;
            el.textContent = DEADLINE; el.classList.remove('overdue'); rem.textContent = text; rem.style.color = '#e67e22';
            hdrTime.textContent = DEADLINE; hdr.className = 'header-deadline warning';
            if (lastWarningLevel < 1) { playWarningSound(); }
        } else {
            el.textContent = DEADLINE; el.classList.remove('overdue');
            rem.textContent = `还有 ${rh}小时${rm}分钟`; rem.style.color = '#FF6B9D';
            hdrTime.textContent = DEADLINE; hdr.className = 'header-deadline';
        }
        lastWarningLevel = diff < 30 * 60000 ? 2 : diff < 60 * 60000 ? 1 : 0;
    }

    // 默认作业（从URL参数或localStorage恢复）
    const DEFAULT_HOMEWORK = [
        { id:1, name:'橙果APP打卡', icon:'📱', time:15, status:'waiting' },
        { id:2, name:'英语一起作业', icon:'🎧', time:20, status:'waiting' },
        { id:3, name:'阅读半小时', icon:'📚', time:30, status:'waiting' },
        { id:4, name:'口算题一页', icon:'🔢', time:20, status:'waiting' },
        { id:5, name:'老师作业', icon:'📝', time:0, status:'waiting' }
    ];

    let homework = [];
    let currentTask = null;
    let timerInterval = null;
    let startTime = null;
    let pausedTime = 0;
    let isPaused = false;
    let restStartTime = null;
    let assignedTask = null;

    const praises = [
        '太棒了！提前完成！🎉', '速度超快！继续保持！🌟', '效率满分！✨',
        '又快又专注！💯', '专注力超强！👏', '提前完成！超厉害！🚀'
    ];
    const encouragements = [
        '虽然超时了，但坚持完成就是胜利！💪', '做完就是好样的！继续加油！🌈', '没关系，尽力就好！💖'
    ];

    function init() {
        updateDate();
        loadHomework();
        // 解析URL参数（来自OpenClaw布置作业）
        parseURLParams();
        renderHomeworkList();
        updateStats();
        updateDeadlineWithWarning();
        setInterval(() => { updateDeadlineWithWarning(); updateStats(); }, 30000);
    }

    function updateDate() {
        const now = new Date();
        const days = ['日','一','二','三','四','五','六'];
        document.getElementById('dateDisplay').textContent =
            `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
    }

    function parseURLParams() {
        const params = new URLSearchParams(window.location.search);
        const task = params.get('task');
        const tname = params.get('task_name');
        const sug = params.get('suggest');
        const deadline = params.get('deadline');

        if (task === 'assigned' && tname) {
            assignedTask = {
                name: decodeURIComponent(tname),
                time: parseInt(sug) || 0,
                deadline: deadline || DEADLINE
            };
            document.getElementById('assignedTitle').textContent = '📋 家长布置了新作业';
            document.getElementById('assignedDesc').textContent = `${assignedTask.name} ${assignedTask.time > 0 ? '· ' + assignedTask.time + '分钟' : ''}`;
            document.getElementById('assignedAlert').style.display = 'block';
            // 自动发送作业清单到飞书群
            setTimeout(() => sendHomeworkCard(assignedTask), 800);
        }
    }

    function loadHomework() {
        const saved = localStorage.getItem(`hw_${CHILD}`);
        if (saved) {
            homework = JSON.parse(saved);
        } else {
            homework = JSON.parse(JSON.stringify(DEFAULT_HOMEWORK));
        }
    }

    function saveHomework() {
        localStorage.setItem(`hw_${CHILD}`, JSON.stringify(homework));
    }

    function renderHomeworkList() {
        const list = document.getElementById('homeworkList');
        list.innerHTML = homework.map(task => `
            <div class="homework-item">
                <div class="homework-header">
                    <div class="homework-info">
                        <div class="homework-icon">${task.icon}</div>
                        <div>
                            <div class="homework-name">${task.name}</div>
                            <div class="homework-time">⏱ ${task.time > 0 ? task.time + ' 分钟' : '待定'}</div>
                        </div>
                    </div>
                    <div class="homework-status status-${task.status}">${statusText(task.status)}</div>
                </div>
                <button class="start-btn" onclick="startTask(${task.id})" ${task.status === 'done' ? 'disabled' : ''}>
                    ▶ ${task.status === 'done' ? '已完成' : '开始'}
                </button>
            </div>
        `).join('');

        const done = homework.filter(t => t.status === 'done').length;
        const total = homework.length;
        document.getElementById('progressCount').textContent = `${done}/${total} ${ICON}`;
        document.getElementById('progressFill').style.width = `${total > 0 ? (done/total*100) : 0}%`;
    }

    function statusText(s) {
        return { waiting:'⏳ 等待', doing:'🔄 进行中', done:'✅ 完成' }[s] || s;
    }

    function updateStats() {
        const today = new Date().toISOString().split('T')[0];
        const key = `timer_${CHILD}_${today}`;
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        document.getElementById('studyMinutes').textContent = data.studyMinutes || 0;
        document.getElementById('restMinutes').textContent = data.restMinutes || 0;
        document.getElementById('efficiency').textContent = (data.efficiency || 0) + '%';
    }

    function updateDeadline() {
        const now = new Date();
        const [h, m] = DEADLINE.split(':').map(Number);
        const deadline = new Date();
        deadline.setHours(h, m, 0);
        const diff = deadline - now;
        const el = document.getElementById('deadlineTime');
        const rem = document.getElementById('deadlineRemaining');
        if (diff < 0) {
            el.classList.add('overdue');
            rem.textContent = '已过截止时间';
        } else {
            el.classList.remove('overdue');
            const rh = Math.floor(diff/3600000);
            const rm = Math.floor((diff%3600000)/60000);
            rem.textContent = `还有 ${rh}小时${rm}分钟`;
        }
    }

    function startTask(taskId) {
        const task = homework.find(t => t.id === taskId);
        if (!task || task.status === 'done') return;
        currentTask = task;
        task.status = 'doing';
        saveHomework();
        renderHomeworkList();

        document.getElementById('modalTaskName').textContent = task.name;
        document.getElementById('modalSub').textContent = task.time > 0 ? `建议 ${task.time} 分钟` : '自主安排';
        document.getElementById('timerModal').classList.add('active');

        startTime = Date.now();
        pausedTime = 0;
        isPaused = false;
        document.getElementById('pauseBtn').textContent = '⏸ 暂停';
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function startAssigned() {
        if (!assignedTask) return;
        const newId = Math.max(...homework.map(t => t.id), 0) + 1;
        homework.push({ id: newId, name: assignedTask.name, icon: '📋', time: assignedTask.time, status: 'waiting' });
        saveHomework();
        renderHomeworkList();
        document.getElementById('assignedAlert').style.display = 'none';
        startTask(newId);
    }

    function updateTimer() {
        if (isPaused) return;
        const elapsed = Math.floor((Date.now() - startTime - pausedTime) / 1000);
        const m = String(Math.floor(elapsed/60)).padStart(2,'0');
        const s = String(elapsed%60).padStart(2,'0');
        const display = document.getElementById('timerDisplay');
        display.textContent = `${m}:${s}`;

        if (currentTask && currentTask.time > 0) {
            const remaining = currentTask.time * 60 - elapsed;
            const compare = document.getElementById('timerCompare');
            if (remaining > 0) {
                compare.textContent = `预计 ${currentTask.time} 分钟 · 还剩 ${Math.ceil(remaining/60)} 分钟`;
                compare.className = 'timer-compare';
                display.classList.remove('overtime');
            } else {
                compare.textContent = `预计 ${currentTask.time} 分钟 · 已超时 ${Math.floor(-remaining/60)} 分钟`;
                compare.className = 'timer-compare late';
                display.classList.add('overtime');
            }
        } else {
            document.getElementById('timerCompare').textContent = currentTask && currentTask.time === 0 ? '自主安排时间' : '';
        }
    }

    function pauseTimer() {
        if (isPaused) {
            pausedTime += Date.now() - restStartTime;
            isPaused = false;
            document.getElementById('pauseBtn').textContent = '⏸ 暂停';
            document.getElementById('modalSub').textContent = '继续加油！';
        } else {
            restStartTime = Date.now();
            isPaused = true;
            document.getElementById('pauseBtn').textContent = '▶ 继续';
            document.getElementById('modalSub').textContent = '休息一下...';
        }
    }

    function finishTask() {
        clearInterval(timerInterval);
        document.getElementById('timerModal').classList.remove('active');
        if (!currentTask) return;

        const elapsed = Math.floor((Date.now() - startTime - pausedTime) / 1000);
        const totalMin = Math.ceil(elapsed / 60);
        const studyMin = totalMin;
        const efficiency = currentTask.time > 0 ? Math.round((currentTask.time / totalMin) * 100) : 100;
        const capped = Math.min(efficiency, 100);

        saveTaskData(currentTask, totalMin, studyMin, capped);
        showComplete(currentTask, totalMin, studyMin, capped);

        currentTask.status = 'done';
        saveHomework();
        currentTask = null;
        renderHomeworkList();
        updateStats();
    }

    function saveTaskData(task, total, study, efficiency) {
        const today = new Date().toISOString().split('T')[0];
        const key = `timer_${CHILD}_${today}`;
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        data.studyMinutes = (data.studyMinutes || 0) + study;
        data.restMinutes = (data.restMinutes || 0);
        const prevTasks = data.tasks || [];
        const prevEffs = prevTasks.map(t => t.efficiency).filter(Boolean);
        const allEffs = [...prevEffs, efficiency];
        data.efficiency = Math.round(allEffs.reduce((a, b) => a + b, 0) / allEffs.length);
        data.tasks = prevTasks.concat({ name: task.name, time: task.time, actual: total, study, efficiency });
        localStorage.setItem(key, JSON.stringify(data));
    }

    function showComplete(task, total, study, efficiency) {
        const isEarly = task.time > 0 && total < task.time - 3;
        const isLate = task.time > 0 && total > task.time + 5;

        document.getElementById('completeEmoji').textContent = isEarly ? '🎉' : isLate ? '💪' : '👍';
        document.getElementById('completeTitle').textContent = isEarly ? '太棒了！' : isLate ? '坚持完成！' : '完成！';
        document.getElementById('completeTotal').textContent = total + '分钟';
        document.getElementById('completeExpected').textContent = task.time > 0 ? task.time + '分钟' : '自主';
        document.getElementById('completeStudy').textContent = study + '分钟';
        document.getElementById('completeRest').textContent = '0分钟';
        document.getElementById('completeEfficiency').textContent = efficiency + '%';
        document.getElementById('completeFeedback').textContent = isEarly ? praises[Math.floor(Math.random()*praises.length)] : isLate ? encouragements[Math.floor(Math.random()*encouragements.length)] : '准时完成，继续保持！👍';
        document.getElementById('completeModal').classList.add('active');
    }

    function closeComplete() {
        document.getElementById('completeModal').classList.remove('active');
    }

    function addHomework() {
        const name = document.getElementById('newName').value.trim();
        const time = parseInt(document.getElementById('newTime').value);
        if (!name) { showToast('请输入作业名称'); return; }
        if (!time || time < 1) { showToast('请输入有效时间'); return; }
        homework.push({ id: Date.now(), name, icon: '📝', time, status: 'waiting' });
        saveHomework();
        renderHomeworkList();
        document.getElementById('newName').value = '';
        document.getElementById('newTime').value = '';
        showToast('作业已添加 ✅');
    }

    function exportData() {
        const keys = {};
        for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k.startsWith('timer_') || k.startsWith('hw_')) keys[k] = localStorage.getItem(k);
        }
        const blob = new Blob([JSON.stringify(keys, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `yujia_data_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        showToast('数据已导出 📤');
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = JSON.parse(ev.target.result);
                Object.entries(data).forEach(([k,v]) => localStorage.setItem(k, v));
                showToast('数据导入成功 ✅');
                loadHomework();
                renderHomeworkList();
                updateStats();
            } catch(err) { showToast('导入失败 ❌'); }
        };
        reader.readAsText(file);
    }

    function resetData() {
        if (!confirm('确定清空今日数据吗？')) return;
        const today = new Date().toISOString().split('T')[0];
        localStorage.removeItem(`timer_${CHILD}_${today}`);
        localStorage.removeItem(`hw_${CHILD}`);
        homework = JSON.parse(JSON.stringify(DEFAULT_HOMEWORK));
        renderHomeworkList();
        updateStats();
        showToast('已重置 🔄');
    }

    // 发送作业清单卡片到飞书群（自动 @孩子和家长）
    function sendHomeworkCard(task) {
        const now = new Date();
        const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
        const timeTip = task.time > 0 ? `⏱ 建议完成时间：${task.time} 分钟` : '';
        const card = {
            msg_type: 'interactive',
            card: {
                config: { wide_screen_mode: true },
                header: {
                    title: { tag: 'plain_text', content: `📋 家长布置作业通知 — ${CHILD_NAME}` },
                    template: 'orange'
                },
                elements: [
                    {
                        tag: 'div',
                        text: {
                            tag: 'lark_md',
                            content: `<at user_id="${CHILD_OPEN_ID}">${CHILD_NAME}</at>，爸爸妈妈给你布置了作业啦！快去看看吧 🐱\n\n收到请回复：「好的！」`
                        }
                    },
                    { tag: 'hr' },
                    {
                        tag: 'div',
                        fields: [
                            { is_short: true, text: { tag: 'lark_md', content: `**📌 作业内容**\n${task.name}` } },
                            { is_short: true, text: { tag: 'lark_md', content: `**📅 日期**\n${dateStr}` } }
                        ]
                    },
                    timeTip ? {
                        tag: 'div',
                        text: { tag: 'lark_md', content: `⏱ **建议完成时间**：${task.time} 分钟` }
                    } : { tag: 'div', text: { tag: 'lark_md', content: `⏱ **建议完成时间**：自主安排` } },
                    { tag: 'hr' },
                    {
                        tag: 'action',
                        actions: [
                            {
                                tag: 'button',
                                text: { tag: 'plain_text', content: '🐱 前往计时器' },
                                type: 'primary',
                                url: `https://tangshaoxiong1978-ops.github.io/yujia-homework-cat/yujia.html`
                            }
                        ]
                    },
                    {
                        tag: 'note',
                        elements: [
                            { tag: 'plain_text', content: '💡 打开上方链接即可开始计时，祝学习愉快！' }
                        ]
                    }
                ]
            }
        };
        fetch(FEISHU_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(card)
        }).then(r => r.ok ? showToast('作业通知已发送 📨') : showToast('发送失败 ❌')).catch(() => showToast('发送失败 ❌'));
    }

    function sendReport() {
        const today = new Date().toISOString().split('T')[0];
        const key = `timer_${CHILD}_${today}`;
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        const done = homework.filter(t => t.status === 'done').length;
        const total = homework.length;
        const m = new Date().getMonth()+1, d = new Date().getDate();
        const tasksMd = data.tasks && data.tasks.length > 0 ? data.tasks.map(t => {
            const effLabel = t.efficiency >= 90 ? '🟢' : t.efficiency >= 70 ? '🟡' : '🔴';
            return { tag: 'div', text: { tag: 'lark_md', content: `${effLabel} ${t.name}：${t.actual}分钟（效率${t.efficiency}%）` } };
        }) : [{ tag: 'div', text: { tag: 'lark_md', content: '暂无计时记录' } }];

        const card = {
            msg_type: 'interactive',
            card: {
                schema: '2023-08-01',
                header: {
                    title: { tag: 'plain_text', content: `🐱 羽佳作业日报 · ${m}月${d}日` },
                    template: 'orange'
                },
                elements: [
                    { tag: 'hr' },
                    {
                        tag: 'column_set',
                        flex_mode: 'none',
                        horizontal_spacing: 'large',
                        columns: [
                            { tag: 'column', width: 'auto', elements: [{ tag: 'div', text: { tag: 'lark_md', content: '**📊 完成进度**\n`' + done + '/' + total + '` 项' } }] },
                            { tag: 'column', width: 'auto', elements: [{ tag: 'div', text: { tag: 'lark_md', content: '**⏱ 学习时长**\n`' + (data.studyMinutes || 0) + '` 分钟' } }] },
                            { tag: 'column', width: 'auto', elements: [{ tag: 'div', text: { tag: 'lark_md', content: '**📈 效率**\n`' + (data.efficiency || 0) + '`%' } }] }
                        ]
                    },
                    { tag: 'hr' },
                    { tag: 'div', text: { tag: 'lark_md', content: '**✅ 完成详情**' } },
                    ...tasksMd,
                    { tag: 'hr' },
                    {
                        tag: 'note',
                        elements: [
                            { tag: 'plain_text', content: '🐱 由作业计时器自动生成 · @学习辅导员小龙虾' }
                        ]
                    }
                ]
            }
        };
        fetch(FEISHU_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(card) })
            .then(r => r.ok ? (
                showToast('报告已发送飞书 📬'),
                // 发送完成后自动 @家长 确认
                fetch(FEISHU_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        msg_type: 'text',
                        content: { text: `🐱 羽佳作业报告已更新！请爸爸妈妈查收～ @小龙虾爸爸 @小龙虾妈妈` }
                    })
                }).catch(() => {})
            ) : showToast('发送失败，请重试'))
            .catch(() => { navigator.clipboard.writeText(JSON.stringify(card, null, 2)); showToast('飞书发送失败，已复制JSON'); });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
    </script>
</body>
</html>
