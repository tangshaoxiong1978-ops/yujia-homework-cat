<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羽菡森林计时器 🌿</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f0f9f0 0%, #e8f5e9 50%, #f1f8e9 100%);
            min-height: 100vh;
            padding-bottom: 40px;
        }
        body::before { content: '🍃'; position: fixed; top: 80px; right: 18px; font-size: 28px; opacity: 0.25; animation: sway 4s ease-in-out infinite; }
        body::after { content: '🌲'; position: fixed; top: 150px; left: 12px; font-size: 22px; opacity: 0.2; animation: sway 5s ease-in-out infinite 1.5s; }
        @keyframes sway { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg) translateX(5px); } }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: rgba(255,255,255,0.82); backdrop-filter: blur(10px); box-shadow: 0 2px 16px rgba(76,175,80,0.12); position: sticky; top: 0; z-index: 100; }
        .header-title { display: flex; align-items: center; gap: 10px; }
        .header-icon { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #81C784 0%, #4CAF50 100%); display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 12px rgba(76,175,80,0.3); }
        .header-name { font-size: 18px; font-weight: 700; color: #2E7D32; }
        .header-switch { display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: linear-gradient(135deg, #F8BBD9 0%, #F48FB1 100%); border-radius: 20px; font-size: 13px; font-weight: 600; color: #880E4F; text-decoration: none; }
        .main { padding: 0 16px; }
        .avatar-section { text-align: center; padding: 24px 0 16px; }
        .main-avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #81C784 0%, #4CAF50 100%); display: inline-flex; align-items: center; justify-content: center; font-size: 46px; box-shadow: 0 8px 24px rgba(76,175,80,0.3); margin-bottom: 10px; animation: pulse-forest 3.5s ease-in-out infinite; }
        @keyframes pulse-forest { 0%,100% { box-shadow: 0 8px 24px rgba(76,175,80,0.3); } 50% { box-shadow: 0 8px 32px rgba(76,175,80,0.45); } }
        .greeting { font-size: 20px; font-weight: 700; color: #2E7D32; margin-bottom: 4px; }
        .date-display { font-size: 14px; color: #999; }
        .card { background: rgba(255,255,255,0.9); border-radius: 20px; padding: 18px; margin-bottom: 14px; box-shadow: 0 4px 20px rgba(76,175,80,0.08); }
        .progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .progress-title { font-size: 15px; font-weight: 600; color: #555; display: flex; align-items: center; gap: 6px; }
        .progress-count { font-size: 18px; font-weight: 800; color: #4CAF50; }
        .progress-bar { height: 10px; background: #e8f5e9; border-radius: 5px; overflow: hidden; margin-bottom: 14px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #81C784, #4CAF50); border-radius: 5px; transition: width 0.5s ease; }
        .stats-row { display: flex; justify-content: space-around; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 26px; font-weight: 800; color: #4CAF50; }
        .stat-label { font-size: 12px; color: #aaa; margin-top: 2px; }
        .deadline-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; font-size: 14px; color: #888; }
        .deadline-time { font-size: 24px; font-weight: 800; color: #4CAF50; }
        .deadline-time.overdue { color: #e74c3c; }
        .shengdi-card { background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%); border-radius: 16px; padding: 14px; margin-bottom: 14px; border-left: 4px solid #FFA000; display: flex; align-items: center; gap: 12px; }
        .shengdi-icon { font-size: 32px; }
        .shengdi-info { flex: 1; }
        .shengdi-title { font-size: 14px; font-weight: 700; color: #E65100; margin-bottom: 2px; }
        .shengdi-count { font-size: 22px; font-weight: 800; color: #FF6D00; }
        .shengdi-label { font-size: 12px; color: #888; }
        .assigned-alert { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); border-radius: 16px; padding: 14px; margin-bottom: 14px; border-left: 4px solid #FF9800; display: flex; align-items: center; gap: 10px; }
        .assigned-alert-text { flex: 1; }
        .assigned-alert-title { font-size: 14px; font-weight: 700; color: #E65100; margin-bottom: 2px; }
        .assigned-alert-desc { font-size: 13px; color: #777; }
        .assigned-alert-action { padding: 8px 16px; background: linear-gradient(135deg, #FFB74D 0%, #FF9800 100%); color: white; border: none; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .section-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: #555; margin-bottom: 12px; }
        .homework-item { background: rgba(255,255,255,0.92); border-radius: 16px; padding: 16px; margin-bottom: 10px; box-shadow: 0 3px 14px rgba(76,175,80,0.06); transition: transform 0.2s; }
        .homework-item:hover { transform: translateY(-1px); }
        .homework-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .homework-info { display: flex; align-items: center; gap: 10px; }
        .homework-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #81C784 0%, #4CAF50 100%); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .homework-name { font-size: 16px; font-weight: 600; color: #333; }
        .homework-time { font-size: 13px; color: #aaa; }
        .homework-status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-waiting { background: #e8f5e9; color: #388e3c; }
        .status-doing { background: #e3f2fd; color: #1976d2; }
        .status-done { background: #e8f5e9; color: #4caf50; }
        .start-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #81C784 0%, #4CAF50 100%); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
        .start-btn:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(76,175,80,0.35); }
        .start-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .add-form { display: flex; gap: 8px; margin-top: 8px; }
        .add-input { flex: 1; padding: 12px 14px; border: 2px solid #e8f5e9; border-radius: 12px; font-size: 14px; outline: none; }
        .add-input:focus { border-color: #4CAF50; }
        .time-input { width: 72px; padding: 12px; border: 2px solid #e8f5e9; border-radius: 12px; font-size: 14px; text-align: center; outline: none; }
        .time-input:focus { border-color: #4CAF50; }
        .add-btn { padding: 12px 20px; background: linear-gradient(135deg, #81C784 0%, #4CAF50 100%); color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .report-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #FFB74D 0%, #FF9800 100%); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 16px rgba(255,152,0,0.3); margin-top: 8px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 24px; padding: 28px 24px; width: 90%; max-width: 340px; text-align: center; }
        .modal-icon { font-size: 64px; margin-bottom: 8px; }
        .modal-task { font-size: 17px; font-weight: 700; color: #333; margin-bottom: 6px; }
        .modal-sub { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        .timer-display { font-size: 52px; font-weight: 800; color: #4CAF50; font-variant-numeric: tabular-nums; margin-bottom: 6px; }
        .timer-display.overtime { color: #e74c3c; }
        .timer-compare { font-size: 14px; color: #999; margin-bottom: 20px; }
        .timer-compare.early { color: #27ae60; }
        .timer-compare.late { color: #e74c3c; }
        .timer-controls { display: flex; gap: 10px; justify-content: center; }
        .timer-btn { padding: 12px 28px; border-radius: 30px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #81C784, #4CAF50); color: white; }
        .btn-secondary { background: #f5f5f5; color: #555; }
        .btn-success { background: #27ae60; color: white; }
        .complete-emoji { font-size: 72px; margin-bottom: 8px; }
        .complete-title { font-size: 22px; font-weight: 800; color: #333; margin-bottom: 16px; }
        .complete-stats { background: #f1f8e9; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .stat-row:last-child { margin-bottom: 0; }
        .stat-row-label { color: #888; }
        .stat-row-value { font-weight: 700; color: #333; }
        .complete-feedback { font-size: 15px; color: #4CAF50; font-weight: 700; margin-bottom: 16px; }
        .data-actions { display: flex; gap: 8px; margin-bottom: 12px; }
        .data-btn { flex: 1; padding: 12px 8px; border-radius: 12px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .data-btn.export { background: #e3f2fd; color: #1565c0; }
        .data-btn.import { background: #e8f5e9; color: #2e7d32; }
        .data-btn.reset { background: #ffebee; color: #c62828; }
        .data-btn-icon { font-size: 20px; }
        #fileInput { display: none; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 2000; opacity: 0; transition: all 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <div class="header-icon">🌿</div>
            <div class="header-name">羽菡森林计时器</div>
        </div>
        <a href="yujia.html" class="header-switch">🐱 切换羽佳</a>
    </div>

    <div class="main">
        <div class="avatar-section">
            <div class="main-avatar">🌿</div>
            <div class="greeting">🌿 羽菡加油！稳步前行！🌿</div>
            <div class="date-display" id="dateDisplay"></div>
        </div>

        <div class="card">
            <div class="deadline-row">
                <span>⏰</span><span>今日截止</span>
                <span class="deadline-time" id="deadlineTime">23:00</span>
            </div>
            <div class="deadline-row" style="margin-bottom:0">
                <span id="deadlineRemaining" style="color:#4CAF50;font-weight:700;font-size:15px;"></span>
            </div>
        </div>

        <div class="card">
            <div class="shengdi-card">
                <div class="shengdi-icon">🌏</div>
                <div class="shengdi-info">
                    <div class="shengdi-title">生地会考倒计时</div>
                    <div><span class="shengdi-count" id="shengdiDays">--</span> <span class="shengdi-label">天后考试</span></div>
                </div>
            </div>
            <div class="deadline-row">
                <span>📚</span><span>剩余复习时间</span>
                <span id="shengdiStudy" style="font-weight:700;color:#4CAF50;font-size:15px;"></span>
            </div>
        </div>

        <div class="card">
            <div class="progress-header">
                <div class="progress-title">📚 今日进度</div>
                <div class="progress-count" id="progressCount">0/4</div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            <div class="stats-row">
                <div class="stat-item"><div class="stat-value" id="studyMinutes">0</div><div class="stat-label">学习分钟</div></div>
                <div class="stat-item"><div class="stat-value" id="restMinutes">0</div><div class="stat-label">休息分钟</div></div>
                <div class="stat-item"><div class="stat-value" id="efficiency">0%</div><div class="stat-label">学习效率</div></div>
            </div>
        </div>

        <div class="card" id="assignedAlert" style="display:none;">
            <div class="assigned-alert">
                <div class="assigned-alert-icon">📋</div>
                <div class="assigned-alert-text">
                    <div class="assigned-alert-title" id="assignedTitle">家长布置了新作业</div>
                    <div class="assigned-alert-desc" id="assignedDesc"></div>
                </div>
                <button class="assigned-alert-action" onclick="startAssigned()">开始 ⏱</button>
            </div>
        </div>

        <div class="section-title">📝 今日作业</div>
        <div id="homeworkList"></div>

        <div class="card">
            <div class="section-title" style="margin-bottom:12px">✨ 添加额外作业</div>
            <div class="add-form">
                <input type="text" class="add-input" id="newName" placeholder="作业名称，如：物理练习">
                <input type="number" class="time-input" id="newTime" placeholder="分钟" min="1">
                <button class="add-btn" onclick="addHomework()">+</button>
            </div>
        </div>

        <div class="card">
            <div class="section-title" style="margin-bottom:12px">💾 数据管理</div>
            <div class="data-actions">
                <button class="data-btn export" onclick="exportData()"><span class="data-btn-icon">📤</span>导出</button>
                <button class="data-btn import" onclick="document.getElementById('fileInput').click()"><span class="data-btn-icon">📥</span>导入</button>
                <button class="data-btn reset" onclick="resetData()"><span class="data-btn-icon">🔄</span>重置</button>
            </div>
            <button class="report-btn" onclick="sendReport()">📊 发送今日报告给爸爸妈妈</button>
        </div>
        <br><br>
    </div>

    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">

    <div class="modal-overlay" id="timerModal">
        <div class="modal">
            <div class="modal-icon">🌿</div>
            <div class="modal-task" id="modalTaskName">语文阅读</div>
            <div class="modal-sub" id="modalSub">专注中...</div>
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="timer-compare" id="timerCompare">预计 20 分钟</div>
            <div class="timer-controls">
                <button class="timer-btn btn-secondary" id="pauseBtn" onclick="pauseTimer()">⏸ 暂停</button>
                <button class="timer-btn btn-success" onclick="finishTask()">✅ 完成</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="completeModal">
        <div class="modal">
            <div class="complete-emoji" id="completeEmoji">🎉</div>
            <div class="complete-title" id="completeTitle">太棒了！</div>
            <div class="complete-stats">
                <div class="stat-row"><span class="stat-row-label">总用时</span><span class="stat-row-value" id="completeTotal">25分钟</span></div>
                <div class="stat-row"><span class="stat-row-label">预计时间</span><span class="stat-row-value" id="completeExpected">20分钟</span></div>
                <div class="stat-row"><span class="stat-row-label">实际学习</span><span class="stat-row-value" id="completeStudy">23分钟</span></div>
                <div class="stat-row"><span class="stat-row-label">休息时间</span><span class="stat-row-value" id="completeRest">0分钟</span></div>
                <div class="stat-row"><span class="stat-row-label">学习效率</span><span class="stat-row-value" id="completeEfficiency">92%</span></div>
            </div>
            <div class="complete-feedback" id="completeFeedback">提前完成！效率超高！✨</div>
            <button class="timer-btn btn-primary" style="width:100%" onclick="closeComplete()">继续加油 💪</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const CHILD = 'yuhan';
    const DEADLINE = '23:00';
    const ICON = '🌿';
    const SHENGDI_DATE = new Date('2026-06-15');
    const DEFAULT_HOMEWORK = [
        { id:1, name:'语文作业', icon:'📖', time:30, status:'waiting' },
        { id:2, name:'数学练习', icon:'📐', time:30, status:'waiting' },
        { id:3, name:'英语听说', icon:'🎧', time:20, status:'waiting' },
        { id:4, name:'学校作业', icon:'📝', time:0, status:'waiting' }
    ];
    let homework = [], currentTask = null, timerInterval = null, startTime = null, pausedTime = 0, isPaused = false, restStartTime = null, assignedTask = null;
    const praises = ['太棒了！提前完成！🎉','专注力满分！继续加油！🌟','效率超高！💯','稳步前进！🌿','高效完成！👏','提前完成！厉害！🚀'];
    const encouragements = ['虽然超时了，但坚持完成就是胜利！💪','做完就是好样的！继续努力！🌈','没关系，尽力就好！💖'];

    function init() {
        updateDate(); updateShengdi(); loadHomework(); parseURLParams();
        renderHomeworkList(); updateStats(); updateDeadline();
        setInterval(() => { updateDeadline(); updateShengdi(); }, 60000);
    }

    function updateDate() {
        const now = new Date(), days = ['日','一','二','三','四','五','六'];
        document.getElementById('dateDisplay').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
    }

    function updateShengdi() {
        const now = new Date(), diff = SHENGDI_DATE - now, days = Math.max(0, Math.ceil(diff / 86400000));
        document.getElementById('shengdiDays').textContent = days;
        document.getElementById('shengdiStudy').textContent = `约 ${Math.floor(days * 2)} 小时`;
    }

    function parseURLParams() {
        const p = new URLSearchParams(window.location.search);
        const t = p.get('task'), n = p.get('task_name'), s = p.get('suggest');
        if (t === 'assigned' && n) {
            assignedTask = { name: decodeURIComponent(n), time: parseInt(s) || 0 };
            document.getElementById('assignedDesc').textContent = `${assignedTask.name}${assignedTask.time > 0 ? ' · ' + assignedTask.time + '分钟' : ''}`;
            document.getElementById('assignedAlert').style.display = 'block';
        }
    }

    function loadHomework() { homework = JSON.parse(localStorage.getItem(`hw_${CHILD}`)) || JSON.parse(JSON.stringify(DEFAULT_HOMEWORK)); }
    function saveHomework() { localStorage.setItem(`hw_${CHILD}`, JSON.stringify(homework)); }

    function renderHomeworkList() {
        const done = homework.filter(t => t.status === 'done').length;
        const total = homework.length;
        document.getElementById('progressCount').textContent = `${done}/${total} ${ICON}`;
        document.getElementById('progressFill').style.width = `${total > 0 ? (done/total*100) : 0}%`;
        document.getElementById('homeworkList').innerHTML = homework.map(task => `
            <div class="homework-item">
                <div class="homework-header">
                    <div class="homework-info">
                        <div class="homework-icon">${task.icon}</div>
                        <div><div class="homework-name">${task.name}</div><div class="homework-time">⏱ ${task.time > 0 ? task.time + ' 分钟' : '待定'}</div></div>
                    </div>
                    <div class="homework-status status-${task.status}">${statusText(task.status)}</div>
                </div>
                <button class="start-btn" onclick="startTask(${task.id})" ${task.status === 'done' ? 'disabled' : ''}>▶ ${task.status === 'done' ? '已完成' : '开始'}</button>
            </div>`).join('');
    }

    function statusText(s) { return { waiting:'⏳ 等待', doing:'🔄 进行中', done:'✅ 完成' }[s] || s; }

    function updateStats() {
        const today = new Date().toISOString().split('T')[0];
        const data = JSON.parse(localStorage.getItem(`timer_${CHILD}_${today}`) || '{}');
        document.getElementById('studyMinutes').textContent = data.studyMinutes || 0;
        document.getElementById('restMinutes').textContent = data.restMinutes || 0;
        document.getElementById('efficiency').textContent = (data.efficiency || 0) + '%';
    }

    function updateDeadline() {
        const now = new Date(), [h,m] = DEADLINE.split(':').map(Number), deadline = new Date(now.setHours(h,m,0));
        const diff = deadline - now;
        const el = document.getElementById('deadlineTime'), rem = document.getElementById('deadlineRemaining');
        if (diff < 0) { el.classList.add('overdue'); rem.textContent = '已过截止时间'; }
        else { el.classList.remove('overdue'); const rh = Math.floor(diff/3600000), rm = Math.floor((diff%3600000)/60000); rem.textContent = `还有 ${rh}小时${rm}分钟`; }
    }

    function startTask(id) {
        currentTask = homework.find(t => t.id === id);
        if (!currentTask || currentTask.status === 'done') return;
        currentTask.status = 'doing'; saveHomework(); renderHomeworkList();
        document.getElementById('modalTaskName').textContent = currentTask.name;
        document.getElementById('modalSub').textContent = currentTask.time > 0 ? `建议 ${currentTask.time} 分钟` : '自主安排';
        document.getElementById('timerModal').classList.add('active');
        startTime = Date.now(); pausedTime = 0; isPaused = false;
        document.getElementById('pauseBtn').textContent = '⏸ 暂停';
        updateTimer(); timerInterval = setInterval(updateTimer, 1000);
    }

    function startAssigned() {
        if (!assignedTask) return;
        homework.push({ id: Date.now(), name: assignedTask.name, icon: '📋', time: assignedTask.time, status: 'waiting' });
        saveHomework(); renderHomeworkList();
        document.getElementById('assignedAlert').style.display = 'none';
        startTask(homework[homework.length-1].id);
    }

    function updateTimer() {
        if (isPaused) return;
        const elapsed = Math.floor((Date.now() - startTime - pausedTime) / 1000);
        document.getElementById('timerDisplay').textContent = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
        if (currentTask && currentTask.time > 0) {
            const remaining = currentTask.time * 60 - elapsed, comp = document.getElementById('timerCompare'), disp = document.getElementById('timerDisplay');
            if (remaining > 0) { comp.textContent = `预计 ${currentTask.time} 分钟 · 还剩 ${Math.ceil(remaining/60)} 分钟`; comp.className = 'timer-compare'; disp.classList.remove('overtime'); }
            else { comp.textContent = `预计 ${currentTask.time} 分钟 · 已超时 ${Math.floor(-remaining/60)} 分钟`; comp.className = 'timer-compare late'; disp.classList.add('overtime'); }
        }
    }

    function pauseTimer() {
        if (isPaused) { pausedTime += Date.now() - restStartTime; isPaused = false; document.getElementById('pauseBtn').textContent = '⏸ 暂停'; document.getElementById('modalSub').textContent = '继续加油！'; }
        else { restStartTime = Date.now(); isPaused = true; document.getElementById('pauseBtn').textContent = '▶ 继续'; document.getElementById('modalSub').textContent = '休息一下...'; }
    }

    function finishTask() {
        clearInterval(timerInterval); document.getElementById('timerModal').classList.remove('active');
        if (!currentTask) return;
        const elapsed = Math.floor((Date.now() - startTime - pausedTime) / 1000);
        const totalMin = Math.ceil(elapsed / 60);
        const eff = currentTask.time > 0 ? Math.min(Math.round((currentTask.time / totalMin) * 100), 100) : 100;
        saveTaskData(currentTask, totalMin, totalMin, eff);
        const isEarly = currentTask.time > 0 && totalMin < currentTask.time - 3;
        const isLate = currentTask.time > 0 && totalMin > currentTask.time + 5;
        document.getElementById('completeEmoji').textContent = isEarly ? '🎉' : isLate ? '💪' : '👍';
        document.getElementById('completeTitle').textContent = isEarly ? '太棒了！' : isLate ? '坚持完成！' : '完成！';
        document.getElementById('completeTotal').textContent = totalMin + '分钟';
        document.getElementById('completeExpected').textContent = currentTask.time > 0 ? currentTask.time + '分钟' : '自主';
        document.getElementById('completeStudy').textContent = totalMin + '分钟';
        document.getElementById('completeEfficiency').textContent = eff + '%';
        document.getElementById('completeFeedback').textContent = isEarly ? praises[Math.floor(Math.random()*praises.length)] : isLate ? encouragements[Math.floor(Math.random()*encouragements.length)] : '准时完成，继续保持！👍';
        document.getElementById('completeModal').classList.add('active');
        currentTask.status = 'done'; saveHomework(); currentTask = null; renderHomeworkList(); updateStats();
    }

    function saveTaskData(task, total, study, eff) {
        const today = new Date().toISOString().split('T')[0], key = `timer_${CHILD}_${today}`;
        const data = JSON.parse(localStorage.getItem(key) || '{}');
        data.studyMinutes = (data.studyMinutes || 0) + study; data.restMinutes = (data.restMinutes || 0); data.efficiency = eff;
        data.tasks = data.tasks || []; data.tasks.push({ name: task.name, time: task.time, actual: total, study, efficiency: eff });
        localStorage.setItem(key, JSON.stringify(data));
    }

    function closeComplete() { document.getElementById('completeModal').classList.remove('active'); }

    function addHomework() {
        const name = document.getElementById('newName').value.trim(), time = parseInt(document.getElementById('newTime').value);
        if (!name) { showToast('请输入作业名称'); return; }
        if (!time || time < 1) { showToast('请输入有效时间'); return; }
        homework.push({ id: Date.now(), name, icon: '📝', time, status: 'waiting' });
        saveHomework(); renderHomeworkList();
        document.getElementById('newName').value = ''; document.getElementById('newTime').value = '';
        showToast('作业已添加 ✅');
    }

    function exportData() {
        const keys = {}; for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k.startsWith('timer_') || k.startsWith('hw_')) keys[k] = localStorage.getItem(k); }
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(keys, null, 2)], { type: 'application/json' }));
        a.download = `yuhan_data_${new Date().toISOString().split('T')[0]}.json`; a.click(); showToast('数据已导出 📤');
    }

    function importData(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) { try { const d = JSON.parse(ev.target.result); Object.entries(d).forEach(([k,v]) => localStorage.setItem(k,v)); showToast('导入成功 ✅'); loadHomework(); renderHomeworkList(); updateStats(); } catch(err) { showToast('导入失败 ❌'); } };
        reader.readAsText(file);
    }

    function resetData() {
        if (!confirm('确定清空今日数据吗？')) return;
        const today = new Date().toISOString().split('T')[0];
        localStorage.removeItem(`timer_${CHILD}_${today}`); localStorage.removeItem(`hw_${CHILD}`);
        homework = JSON.parse(JSON.stringify(DEFAULT_HOMEWORK)); renderHomeworkList(); updateStats(); showToast('已重置 🔄');
    }

    function sendReport() {
        const today = new Date().toISOString().split('T')[0], data = JSON.parse(localStorage.getItem(`timer_${CHILD}_${today}`) || '{}');
        const done = homework.filter(t => t.status === 'done').length, total = homework.length;
        const sd = Math.max(0, Math.ceil((SHENGDI_DATE - new Date()) / 86400000));
        const report = `${ICON} ${new Date().getMonth()+1}月${new Date().getDate()}日 羽菡作业报告\n━━━━━━━━━━━━━━━━━━\n📊 完成进度：${done}/${total} 项\n⏱ 学习时长：${data.studyMinutes || 0} 分钟\n📈 学习效率：${data.efficiency || 0}%\n🌏 生地会考倒计时：还剩 ${sd} 天\n${data.tasks && data.tasks.length > 0 ? '━━━━━━━━━━━━━━━━━━\n' + data.tasks.map(t => `✅ ${t.name}：${t.actual}分钟`).join('\n') + '\n' : ''}━━━━━━━━━━━━━━━━━━\n@学习辅导员小龙虾`;
        navigator.clipboard.writeText(report).then(() => showToast('报告已复制，请在飞书群粘贴发送 📋')).catch(() => alert('请手动复制：\n\n' + report));
    }

    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    init();
    </script>
</body>
</html>
